[tool.ruff]
line-length = 88
target-version = "py310"

[tool.ruff.lint.per-file-ignores]
"ref-idp/ref_idp/routes/*.py" = ["E712"]
"ref-idp/ref_idp/models/*.py" = ["E712"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "basic"
exclude = [
    "**/.venv",
    "**/dist",
    "**/build",
    "ref-idp",
    "examples",
]
extraPaths = [
    "aip-identity-sdk",
    "aip-identity-verify",
    "aip-identity-cli",
    "agent-id-sdk",
    "agent-id-service-sdk",
    "agent-id-cli",
]

[tool.pytest.ini_options]
asyncio_mode = "strict"
